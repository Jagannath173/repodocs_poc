<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python VSIX POC Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #11111b 100%);
            color: #cdd6f4;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(49, 50, 68, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            color: #89b4fa;
            margin-top: 0;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(17, 17, 27, 0.5);
            padding: 20px;
            border-radius: 12px;
            border-bottom: 3px solid #89b4fa;
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-label {
            font-size: 0.9em;
            color: #a6adc8;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #f5e0dc;
        }
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        button {
            background: #89b4fa;
            color: #11111b;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button:hover {
            background: #b4befe;
            box-shadow: 0 0 15px rgba(137, 180, 250, 0.4);
        }
        button:active {
            transform: scale(0.98);
        }
        .log-container {
            background: #11111b;
            padding: 15px;
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            border: 1px solid #313244;
        }
        .log-entry {
            margin-bottom: 5px;
            border-left: 2px solid #585b70;
            padding-left: 10px;
        }
        .log-entry.info { color: #89b4fa; }
        .log-entry.success { color: #a6e3a1; }
        .log-entry.error { color: #f38ba8; }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            background: #313244;
            color: #f5c2e7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Python VSIX POC Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Execution Status</div>
                <div id="status" class="stat-value">Idle</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Last Latency</div>
                <div id="latency" class="stat-value">0ms</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Environment</div>
                <div class="badge">Internal Venv</div>
            </div>
        </div>

        <div class="controls">
            <button id="runBtn">
                <span>▶</span> Run Internal Benchmark
            </button>
        </div>

        <div class="log-container" id="log">
            <div class="log-entry info">Ready to benchmark...</div>
        </div>
    </div>

    <script>
        const vscode = acquireVsCodeApi();
        const runBtn = document.getElementById('runBtn');
        const logContainer = document.getElementById('log');
        const statusEl = document.getElementById('status');
        const latencyEl = document.getElementById('latency');

        runBtn.addEventListener('click', () => {
            statusEl.innerText = 'Running...';
            statusEl.style.color = '#fab387';
            vscode.postMessage({ command: 'runInternal' });
        });

        window.addEventListener('message', event => {
            const message = event.data;
            switch (message.type) {
                case 'log':
                    addLog(message.text, message.status);
                    break;
                case 'result':
                    statusEl.innerText = 'Success';
                    statusEl.style.color = '#a6e3a1';
                    latencyEl.innerText = message.latency + 'ms';
                    addLog('Benchmark complete!', 'success');
                    break;
                case 'error':
                    statusEl.innerText = 'Failed';
                    statusEl.style.color = '#f38ba8';
                    addLog(message.text, 'error');
                    break;
            }
        });

        function addLog(text, status) {
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + (status || 'info');
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
    </script>
</body>
</html>
